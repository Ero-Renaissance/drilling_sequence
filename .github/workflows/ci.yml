name: CI

# Backstop for the local pre-push hook (.githooks/pre-push): a clean-room run of
# the same checks, so a push that was made with --no-verify (or that only breaks
# in a fresh environment) still gets caught. Direct-to-main, so this runs after
# the push — a tripwire, not a gate; the hook is the gate.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend · typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  backend:
    name: Backend · tests (in-memory sqlite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System ODBC headers (for the pyodbc dependency)
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - run: pip install -e ".[dev]"
      - name: Lint (ruff · bug + import rules)
        run: ruff check . --select F,I
      - run: python -m pytest -q
